name: 📊 주간보고 자동 업데이트

on:
  repository_dispatch:
    types: [update_weekly_report]
  workflow_dispatch:
    inputs:
      groups_json:
        description: 'defaultGroups JSON 배열'
        required: true
        type: string

jobs:
  update-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📝 index.html 생성
        run: |
          python3 - << 'PYEOF'
          import json, sys, re, os
          from datetime import datetime

          # 1. 데이터 가져오기 (repository_dispatch 또는 workflow_dispatch)
          groups_json = os.environ.get('GROUPS_JSON', '')
          
          if not groups_json:
              print("❌ groups_json 데이터가 없습니다.")
              sys.exit(1)

          # JSON 유효성 검사
          try:
              groups = json.loads(groups_json)
              print(f"✅ {len(groups)}개 부서 데이터 파싱 완료")
          except json.JSONDecodeError as e:
              print(f"❌ JSON 파싱 오류: {e}")
              sys.exit(1)

          # 2. 템플릿 파일 읽기 (weekly-report.html)
          template_path = 'weekly-report.html'
          if not os.path.exists(template_path):
              print(f"❌ 템플릿 파일 없음: {template_path}")
              sys.exit(1)

          with open(template_path, 'r', encoding='utf-8') as f:
              template = f.read()

          # 3. defaultGroups 부분 교체
          new_data = json.dumps(groups, ensure_ascii=False, indent=2)
          
          # const defaultGroups = [...]; 패턴 찾아서 교체
          pattern = r'(const defaultGroups\s*=\s*)(\[[\s\S]*?\]);'
          replacement = f'\\1{new_data};'
          
          new_html, count = re.subn(pattern, replacement, template)
          
          if count == 0:
              print("⚠️ defaultGroups 패턴을 찾지 못했습니다. 템플릿 확인 필요.")
              sys.exit(1)
          
          print(f"✅ defaultGroups 데이터 교체 완료 ({count}곳)")

          # 4. 생성 시간 메타 주석 추가
          now = datetime.now().strftime('%Y-%m-%d %H:%M')
          meta_comment = f'<!-- 자동 생성: {now} by GitHub Actions -->\n'
          new_html = meta_comment + new_html

          # 5. index.html로 저장
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(new_html)
          
          print(f"✅ index.html 생성 완료 ({len(new_html):,} bytes)")
          PYEOF
        env:
          GROUPS_JSON: ${{ github.event.client_payload.groups || inputs.groups_json }}

      - name: 🚀 GitHub Pages에 배포
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "POSI 자동보고봇"
          git add index.html
          
          # 변경사항이 있을 때만 커밋
          if git diff --staged --quiet; then
            echo "ℹ️ 변경사항 없음 — 커밋 건너뜀"
          else
            WEEK=$(date +%Y-W%V)
            git commit -m "📊 주간업무보고 자동 업데이트 — ${WEEK}"
            git push
            echo "✅ GitHub Pages 배포 완료!"
          fi
